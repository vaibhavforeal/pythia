# Render Blueprint — deploys Pythia as a Docker web service. Accounts and
# saved people live in Supabase Postgres, so no persistent disk is needed.
# Commit this file, then on render.com choose New → Blueprint and point it at
# the repo. Fill the secret vars when prompted.
services:
  - type: web
    name: astroman
    runtime: docker
    plan: free               # no disk needed → the free tier works (spins down when idle)
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: COOKIE_SECURE
        value: "true"
      - key: SESSION_SECRET
        generateValue: true  # Render generates a strong secret once
      - key: CANONICAL_HOST
        sync: false          # set to your custom domain (e.g. pythia.cyou) once its DNS is live
                             # — 301s the onrender.com URL + www to it. Leave unset until then.
      - key: AZURE_DEPLOYMENT
        value: claude-opus-4-8-2
      - key: AZURE_INFERENCE_ENDPOINT
        sync: false          # set in the dashboard (not committed)
      - key: AZURE_INFERENCE_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false          # Supabase → Settings → API → Project URL
      - key: SUPABASE_SERVICE_KEY
        sync: false          # Supabase → Settings → API → service_role key (keep secret)
      # --- Google Sign-In (optional) — leave unset to disable the Google button ---
      - key: GOOGLE_CLIENT_ID
        sync: false          # Google Cloud → APIs & Services → Credentials → OAuth client
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false          # optional — pin to https://pythia.cyou/api/auth/google/callback
                             # once CANONICAL_HOST is set; otherwise it's derived from the host
